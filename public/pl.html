<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P&amp;L Statement — Bulbring AI</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .pl-wrap { max-width: 700px; margin: 0 auto; }
    .form-section { margin-bottom: 32px; }
    .form-section h3 {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: #1B3A6B;
      border-bottom: 2px solid #EBF2FB; padding-bottom: 10px; margin-bottom: 18px;
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 540px) { .field-row { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 600; color: #4A5568; }
    .field input {
      border: 1px solid #CBD5E0; border-radius: 8px;
      padding: 9px 12px; font-size: 14px; color: #1A202C;
      transition: border-color .15s; outline: none;
    }
    .field input:focus { border-color: #1B3A6B; box-shadow: 0 0 0 3px rgba(27,58,107,.1); }
    .field input[type=number] { text-align: right; }
    .expense-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    @media (max-width: 540px) { .expense-grid { grid-template-columns: 1fr; } }
    .expense-item { display: flex; flex-direction: column; gap: 4px; }
    .expense-item label { font-size: 12px; color: #4A5568; font-weight: 500; }
    .expense-item input {
      border: 1px solid #E2E8F0; border-radius: 7px;
      padding: 8px 10px; font-size: 13px; text-align: right;
      outline: none; transition: border-color .15s;
    }
    .expense-item input:focus { border-color: #1B3A6B; }
    .group-label {
      grid-column: 1 / -1;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: #A0AEC0;
      padding-top: 10px; margin-bottom: -4px;
    }
    .generate-btn {
      width: 100%; background: #1B3A6B; color: #fff;
      border: none; border-radius: 10px; padding: 14px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 8px; transition: background .15s;
    }
    .generate-btn:hover:not(:disabled) { background: #2a549a; }
    .generate-btn:disabled { opacity: .6; cursor: not-allowed; }
    .alert { display:none; margin-top:16px; padding:12px 16px; border-radius:9px; font-size:13px; }
    .alert.show { display:block; }
    .alert-error   { background:#FFF5F5; border:1px solid #FEB2B2; color:#C53030; }
    .alert-success { background:#F0FFF4; border:1px solid #9AE6B4; color:#276749; }
    .summary-bar {
      background: #EBF2FB; border-radius: 10px; padding: 14px 18px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
    }
    .summary-bar span { font-size: 13px; color: #4A5568; }
    .summary-bar strong { font-size: 16px; color: #1B3A6B; }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="/dashboard.html" class="topbar-brand">
      <div class="brand-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2a7 7 0 0 0-5 11.6V16h10v-2.4A7 7 0 0 0 12 2z" fill="rgba(255,255,255,0.95)"/><rect x="9" y="17.5" width="6" height="2" rx="1" fill="rgba(255,255,255,0.7)"/><rect x="9.5" y="20.5" width="5" height="1.5" rx=".75" fill="rgba(255,255,255,0.5)"/></svg>
      </div>
      Bulbring AI
    </a>
    <div class="topbar-right">
      <a href="/dashboard.html" style="font-size:13px;color:rgba(255,255,255,.65);text-decoration:none;margin-right:12px;">← Dashboard</a>
      <button class="btn-topbar-logout" id="logout-btn">Sign Out</button>
    </div>
  </nav>

  <div class="main">
    <div class="page-header">
      <h1>Profit &amp; Loss Statement</h1>
      <p>Enter revenue and expenses to generate a formatted P&amp;L — matches CRA T2125 categories</p>
    </div>

    <div class="pl-wrap">
      <div id="summary-bar" class="summary-bar" style="display:none;">
        <div>
          <span>Revenue: </span><strong id="rev-display">$0</strong>
          &nbsp;&nbsp;
          <span>Expenses: </span><strong id="exp-display">$0</strong>
        </div>
        <div>
          <span>Net Income: </span><strong id="net-display" style="font-size:18px;">$0</strong>
        </div>
      </div>

      <form id="pl-form">

        <!-- Header -->
        <div class="form-section">
          <h3>Business Info</h3>
          <div class="field-row">
            <div class="field">
              <label>Business Name</label>
              <input type="text" name="businessName" placeholder="Smith Consulting Inc." />
            </div>
            <div class="field">
              <label>Period Start</label>
              <input type="date" name="periodStart" />
            </div>
            <div class="field" style="grid-column:2">
              <label>Period End</label>
              <input type="date" name="periodEnd" />
            </div>
          </div>
        </div>

        <!-- Revenue -->
        <div class="form-section">
          <h3>Revenue</h3>
          <div class="field-row">
            <div class="field">
              <label>Business Income ($)</label>
              <input type="number" name="revenue" placeholder="0.00" step="0.01" min="0" oninput="updateSummary()" />
            </div>
            <div class="field">
              <label>Other Income ($)</label>
              <input type="number" name="otherIncome" placeholder="0.00" step="0.01" min="0" oninput="updateSummary()" />
            </div>
          </div>
        </div>

        <!-- Expenses -->
        <div class="form-section">
          <h3>Expenses</h3>
          <div class="expense-grid" id="expense-grid"></div>
        </div>

        <button type="submit" class="generate-btn" id="gen-btn">Generate P&amp;L Statement →</button>
        <div class="alert" id="alert"></div>
      </form>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('token'); window.location.href = '/';
    });

    const EXPENSE_GROUPS = [
      { label: 'Vehicle Expenses', items: [
        { key: 'vehicle_fuel',    label: 'Fuel' },
        { key: 'vehicle_repairs', label: 'Repairs & Maintenance' },
        { key: 'vehicle_lease',   label: 'Lease / Loan Payments' },
      ]},
      { label: 'Dues & Memberships', items: [
        { key: 'dues_cpa',   label: 'CPA Dues' },
        { key: 'dues_other', label: 'Other Memberships' },
      ]},
      { label: 'Advertising & Promotion', items: [
        { key: 'advertising_gifts',  label: 'Client Gifts' },
        { key: 'advertising_client', label: 'Client Entertainment' },
        { key: 'advertising_meals',  label: 'Meals & Promotion' },
        { key: 'staff_meals',        label: 'Staff Meals' },
      ]},
      { label: 'Travel', items: [
        { key: 'travel_accommodation', label: 'Accommodation' },
        { key: 'travel_meals',         label: 'Travel Meals' },
        { key: 'travel_general',       label: 'General Travel' },
      ]},
      { label: 'Office Expenses', items: [
        { key: 'office_supplies', label: 'Supplies' },
        { key: 'office_phone',    label: 'Telephone & Internet' },
      ]},
      { label: 'Professional Fees', items: [
        { key: 'professional_accounting', label: 'Accounting' },
        { key: 'professional_legal',      label: 'Legal' },
      ]},
      { label: 'Bank Charges', items: [
        { key: 'bank_interest', label: 'Interest' },
        { key: 'bank_fees',     label: 'Fees' },
      ]},
      { label: 'Other', items: [
        { key: 'other', label: 'Miscellaneous Business Expenses' },
      ]},
    ];

    const grid = document.getElementById('expense-grid');
    for (const group of EXPENSE_GROUPS) {
      const gl = document.createElement('div');
      gl.className = 'group-label';
      gl.textContent = group.label;
      grid.appendChild(gl);
      for (const item of group.items) {
        const div = document.createElement('div');
        div.className = 'expense-item';
        div.innerHTML = `<label>${item.label} ($)</label><input type="number" name="${item.key}" placeholder="0.00" step="0.01" min="0" oninput="updateSummary()" />`;
        grid.appendChild(div);
      }
    }

    function getVal(name) { return parseFloat(document.querySelector(`[name="${name}"]`)?.value) || 0; }

    const EXP_KEYS = EXPENSE_GROUPS.flatMap(g => g.items.map(i => i.key));

    function updateSummary() {
      const rev = getVal('revenue') + getVal('otherIncome');
      const exp = EXP_KEYS.reduce((s, k) => s + getVal(k), 0);
      const net = rev - exp;
      const fmt = n => '$' + n.toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (rev > 0 || exp > 0) {
        document.getElementById('summary-bar').style.display = 'flex';
        document.getElementById('rev-display').textContent = fmt(rev);
        document.getElementById('exp-display').textContent = fmt(exp);
        const netEl = document.getElementById('net-display');
        netEl.textContent = fmt(Math.abs(net));
        netEl.style.color = net >= 0 ? '#276749' : '#C53030';
        if (net < 0) netEl.textContent = '(' + fmt(Math.abs(net)) + ') loss';
      }
    }

    document.getElementById('pl-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('gen-btn');
      btn.disabled = true; btn.textContent = 'Generating…';
      hideAlert();

      const data = { businessName: e.target.businessName.value, periodStart: e.target.periodStart.value, periodEnd: e.target.periodEnd.value, revenue: getVal('revenue'), otherIncome: getVal('otherIncome') };
      for (const k of EXP_KEYS) data[k] = getVal(k);

      try {
        const res = await fetch('/api/pl/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
          body: JSON.stringify(data),
        });
        if (!res.ok) { const d = await res.json(); showAlert(d.error || 'Failed'); btn.disabled = false; btn.textContent = 'Generate P&L Statement →'; return; }

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url;
        a.download = `pl-${new Date().toISOString().split('T')[0]}.xlsx`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showAlert('P&L downloaded! Also saved to File History.', 'success');
      } catch { showAlert('Could not connect to server.'); }

      btn.disabled = false; btn.textContent = 'Generate P&L Statement →';
    });

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg; el.className = `alert alert-${type} show`;
    }
    function hideAlert() { document.getElementById('alert').className = 'alert'; }
  </script>
</body>
</html>

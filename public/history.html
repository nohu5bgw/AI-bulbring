<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File History — Bulbring AI</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .history-table-wrap { overflow-x: auto; margin-top: 24px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: var(--navy, #1B3A6B); color: #fff;
      padding: 10px 14px; text-align: left; font-weight: 600; font-size: 12px;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #EDF2F7; transition: background .1s; }
    tbody tr:hover { background: #F7FAFC; }
    tbody td { padding: 11px 14px; color: #2D3748; vertical-align: middle; }
    .badge {
      display: inline-block; padding: 3px 9px; border-radius: 5px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .badge-bst      { background: #EBF8FF; color: #2B6CB0; }
    .badge-invoice  { background: #F0FFF4; color: #276749; }
    .badge-tb       { background: #FAF5FF; color: #6B46C1; }
    .badge-pl       { background: #FFFAF0; color: #C05621; }
    .badge-hst      { background: #FFF5F5; color: #C53030; }
    .badge-receipt  { background: #EBF4FF; color: #2C5282; }
    .dl-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #1B3A6B; color: #fff;
      border: none; border-radius: 7px;
      padding: 6px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background .15s;
    }
    .dl-btn:hover { background: #2a549a; }
    .empty-state {
      text-align: center; padding: 64px 24px; color: var(--muted);
    }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p  { font-size: 14px; }
    .note-bar {
      background: #FFFBEB; border: 1px solid #F6E05E;
      border-radius: 10px; padding: 12px 16px;
      font-size: 13px; color: #744210;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 4px;
    }
    .ts { font-size: 12px; color: #718096; white-space: nowrap; }
    .desc { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sz { font-size: 12px; color: #718096; white-space: nowrap; }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="/dashboard.html" class="topbar-brand">
      <div class="brand-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2a7 7 0 0 0-5 11.6V16h10v-2.4A7 7 0 0 0 12 2z" fill="rgba(255,255,255,0.95)"/><rect x="9" y="17.5" width="6" height="2" rx="1" fill="rgba(255,255,255,0.7)"/><rect x="9.5" y="20.5" width="5" height="1.5" rx=".75" fill="rgba(255,255,255,0.5)"/></svg>
      </div>
      Bulbring AI
    </a>
    <div class="topbar-right">
      <a href="/dashboard.html" style="font-size:13px;color:rgba(255,255,255,.65);text-decoration:none;margin-right:12px;">← Dashboard</a>
      <button class="btn-topbar-logout" id="logout-btn">Sign Out</button>
    </div>
  </nav>

  <div class="main">
    <div class="page-header">
      <h1>File History</h1>
      <p>Every file generated this session — download any of them again</p>
    </div>

    <div class="note-bar">
      ⚡ History lives in server memory and resets if the server restarts. Download anything you need before closing.
    </div>

    <div id="history-area">
      <div class="empty-state">
        <div style="font-size:36px;margin-bottom:16px;">📂</div>
        <h3>No files yet</h3>
        <p>Files you generate in any tool will appear here for re-download.</p>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = '/';
    });

    const BADGE = {
      bst:     ['badge-bst',     'BST Analysis'],
      bst_tb:  ['badge-tb',      'BST — TB Import'],
      invoice: ['badge-invoice', 'Invoice'],
      tb:      ['badge-tb',      'Trial Balance'],
      pl:      ['badge-pl',      'P&L Statement'],
      hst:     ['badge-hst',     'HST Return'],
      receipt: ['badge-receipt', 'Receipt Scan'],
    };

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function formatTs(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' }) + ' · ' +
             d.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
    }

    async function load() {
      const res = await fetch('/api/history', {
        headers: { Authorization: 'Bearer ' + token },
      });
      if (!res.ok) return;
      const items = await res.json();
      if (items.length === 0) return;

      const area = document.getElementById('history-area');
      area.innerHTML = `
        <div class="history-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Tool</th>
                <th>Description</th>
                <th>Size</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      `;
      const tbody = document.getElementById('tbody');
      for (const item of items) {
        const [cls, label] = BADGE[item.tool] || ['badge-bst', item.toolLabel || item.tool];
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="ts">${formatTs(item.timestamp)}</td>
          <td><span class="badge ${cls}">${label}</span></td>
          <td class="desc" title="${item.description || ''}">${item.description || item.filename}</td>
          <td class="sz">${formatSize(item.size)}</td>
          <td>
            <a class="dl-btn" href="/api/history/${item.id}" headers='{"Authorization":"Bearer ${token}"}' onclick="dlFile(event,'${item.id}','${item.filename}')">
              ↓ Download
            </a>
          </td>
        `;
        tbody.appendChild(tr);
      }
    }

    async function dlFile(e, id, filename) {
      e.preventDefault();
      const res = await fetch(`/api/history/${id}`, {
        headers: { Authorization: 'Bearer ' + token },
      });
      if (!res.ok) { alert('File not found — may have expired after a server restart.'); return; }
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    load();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Bulbring AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2a7 7 0 0 0-5 11.6V16h10v-2.4A7 7 0 0 0 12 2z" fill="rgba(255,255,255,0.95)"/><rect x="9" y="17.5" width="6" height="2" rx="1" fill="rgba(255,255,255,0.7)"/><rect x="9.5" y="20.5" width="5" height="1.5" rx=".75" fill="rgba(255,255,255,0.5)"/></svg>
        </div>
        <h1>Bulbring AI</h1>
        <p>Enter your PIN to continue.</p>
      </div>

      <div id="alert" class="alert"></div>
      <div style="text-align:center;margin-bottom:16px;">
        <a href="/privacy.html" target="_blank" style="font-size:12px;color:#718096;text-decoration:none;display:inline-flex;align-items:center;gap:5px;">
          🔒 Privacy &amp; Data Security
        </a>
      </div>

      <form id="pin-form" autocomplete="off">
        <div class="field">
          <label for="code">PIN</label>
          <input id="code" type="password" inputmode="numeric"
                 placeholder="••••" required
                 autocomplete="off"
                 style="font-size:22px;letter-spacing:6px;text-align:center;" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="pin-btn">Sign In</button>
      </form>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) window.location.href = '/dashboard.html';

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert alert-${type} show`;
    }
    function clearAlert() {
      document.getElementById('alert').className = 'alert';
    }

    document.getElementById('code').focus();

    document.getElementById('pin-form').addEventListener('submit', async e => {
      e.preventDefault();
      clearAlert();
      const btn  = document.getElementById('pin-btn');
      const code = document.getElementById('code').value.trim();
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'Invalid PIN');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          document.getElementById('code').value = '';
          document.getElementById('code').focus();
          return;
        }

        localStorage.setItem('token', data.token);
        window.location.href = '/dashboard.html';

      } catch {
        showAlert('Could not connect to server');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>

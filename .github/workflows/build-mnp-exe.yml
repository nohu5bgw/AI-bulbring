name: Build MNP Bank Writeup EXE

on:
  push:
    branches: [main]
    paths:
      - "tools/mnp_bankwriteup/**"
      - ".github/workflows/build-mnp-exe.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tools/mnp_bankwriteup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        shell: bash
        run: |
          python build.py > build_log.txt 2>&1
          status=$?
          cat build_log.txt
          exit $status

      - name: Commit build log on failure
        if: failure()
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p _buildlogs
          cp tools/mnp_bankwriteup/build_log.txt _buildlogs/latest_build_log.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _buildlogs/latest_build_log.txt
          git commit -m "Capture failed build log [skip ci]" || true
          git push || true

      - name: Copy EXE into site downloads
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p public/downloads
          cp tools/mnp_bankwriteup/dist/MNP_BankWriteup.exe public/downloads/MNP_BankWriteup.exe
          ls -lh public/downloads/

      - name: Commit and push updated EXE
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/downloads/MNP_BankWriteup.exe
          if git diff --cached --quiet; then
            echo "No EXE changes to commit."
          else
            git commit -m "Build MNP_BankWriteup.exe [skip ci]"
            git push
          fi

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNP_BankWriteup-Windows-EXE
          path: tools/mnp_bankwriteup/dist/MNP_BankWriteup.exe
